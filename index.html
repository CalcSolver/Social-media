<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcmeMes - Ultimate Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container" class="container">
        <h2>Welcome to AcmeMes</h2>
        <form id="auth-form">
            <input type="text" id="username" placeholder="Display Name (New Signups)" autocomplete="off">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submit-btn">Login</button>
        </form>
        <p id="toggle-auth">Don't have an account? <span id="toggle-link">Sign Up</span></p>
    </div>

    <div id="app-container" class="app-wrapper hidden">
        
        <aside class="sidebar">
            <div class="profile-header">
                <div id="my-profile-display" style="cursor: pointer;">
                    <img id="my-avatar" src="https://via.placeholder.com/40" alt="Avatar" class="avatar-sm">
                    <span id="my-display-name">Loading...</span>
                </div>
                <button id="logout-btn">Logout</button>
            </div>
            <div class="chat-targets">
                <button class="target-btn active" id="target-public">Global Chat</button>
                <hr>
                <h4>Direct Messages</h4>
                <div id="users-list"></div>
            </div>
        </aside>

        <main class="chat-area">
            <header id="chat-room-header">
                <h3 id="current-room-title">Global Chat</h3>
            </header>
            
            <div id="chat-messages"></div>

            <form id="chat-form">
                <label class="file-label">
                    📁
                    <input type="file" id="media-input" accept="image/*,video/*" style="display:none;">
                </label>
                <input type="text" id="message-input" placeholder="Type a message or attach a file..." required autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </main>
    </div>

    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" id="close-profile-modal">&times;</span>
            <img id="view-profile-avatar" src="https://via.placeholder.com/100" class="avatar-lg">
            <h3 id="view-profile-name">Username</h3>
            <p id="view-profile-email">email@example.com</p>
            <p id="view-profile-status"></p>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" id="close-settings-modal">&times;</span>
            <h3>Edit Profile Settings</h3>
            <form id="settings-form">
                <label>Change Profile Picture:</label>
                <input type="file" id="settings-avatar-input" accept="image/*">
                <label>Change Username:</label>
                <input type="text" id="settings-name-input" placeholder="New Username">
                <label>Update Status/Bio:</label>
                <input type="text" id="settings-status-input" placeholder="What's on your mind?">
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
