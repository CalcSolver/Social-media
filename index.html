<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACMemes Chat Room</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="auth-container" class="auth-box">
        <h2>Welcome to ACMemes</h2>
        <form id="auth-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submit-btn">Login</button>
        </form>
        <p id="toggle-auth">Don't have an account? <span id="toggle-link">Sign Up</span></p>
    </div>

    <div id="app-container" class="hidden">
        <div class="sidebar">
            <div id="my-profile-display" class="profile-header">
                <img id="my-avatar" src="" alt="Avatar">
                <span id="my-displayName">Loading...</span>
            </div>
            <hr>
            <button id="target-public" class="target-btn active">🌐 Global Chat</button>
            <h3>Direct Messages</h3>
            <div id="users-list"></div>
            
            <div id="admin-monitor-panel" class="hidden">
                <hr>
                <h4>Admin Intercept</h4>
                <input type="text" id="admin-room-input" placeholder="Room ID">
                <button id="admin-spy-btn">Spy Room</button>
            </div>
            <button id="logout-btn">Log Out</button>
            <button id="theme-toggle-btn">Toggle Theme</button>
        </div>

        <div id="messaging-container" class="chat-area">
            <div class="chat-header">
                <h2 id="current-room-title">Global Chat</h2>
                <button id="call-btn" class="hidden">📞 Call User</button>
            </div>
            <div id="chat-messages" class="messages-log"></div>
            <div id="typing-indicator-box" class="typing-status"></div>

            <form id="chat-form" class="input-row">
                <label for="media-input" class="attach-label">📎</label>
                <input type="file" id="media-input" accept="image/*,video/*" style="display:none;">
                <input type="text" id="message-input" placeholder="Type a message or drop a file..." autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-profile-modal" class="close">&times;</span>
            <img id="view-profile-avatar" src="" alt="Profile">
            <h3 id="view-profile-name"></h3>
            <p id="view-profile-email"></p>
            <p id="view-profile-status"></p>
            <button id="dm-start-btn">Message User</button>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-settings-modal" class="close">&times;</span>
            <h3>Update Profile</h3>
            <form id="settings-form">
                <label>Display Name</label>
                <input type="text" id="settings-name-input" required>
                <label>Status Message</label>
                <input type="text" id="settings-status-input">
                <label>Change Avatar File</label>
                <input type="file" id="settings-avatar-input" accept="image/*">
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>

    <div id="video-call-modal" class="modal hidden">
        <div class="modal-content video-grid-box">
            <h3>Live Video Chat</h3>
            <div class="video-container">
                <div>
                    <video id="remote-video" autoplay playsinline></video>
                    <p>Friend</p>
                </div>
                <div>
                    <video id="local-video" autoplay playsinline muted></video>
                    <p>You (Your Camera)</p>
                </div>
            </div>
            <button id="end-call-btn" class="action-btn del">Hang Up ❌</button>
        </div>
    </div>

</body>
</html>
