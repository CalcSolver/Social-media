<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcmeMes - Ultimate Chat, Feed & Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Contextual styling for message actions */
        .msg-actions { display: none; margin-left: 10px; gap: 5px; font-size: 0.85em; }
        .msg:hover .msg-actions { display: inline-flex; }
        .action-btn { cursor: pointer; color: #007bff; background: none; border: none; padding: 0 2px; }
        .action-btn.del { color: #dc3545; }
    </style>
</head>
<body>

    <div id="auth-container" class="container">
        <h2>Welcome to AcmeMes</h2>
        <form id="auth-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submit-btn">Login</button>
        </form>
        <p id="toggle-auth">Don't have an account? <span id="toggle-link">Sign Up</span></p>
    </div>

    <div id="app-container" class="app-wrapper hidden">
        
        <aside class="sidebar">
            <div class="profile-header">
                <div id="my-profile-display" style="cursor: pointer;">
                    <img id="my-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Avatar" class="avatar-sm">
                    <span id="my-display-name">Loading...</span>
                </div>
                <button id="logout-btn">Logout</button>
            </div>
            
            <div class="search-box-container" style="padding: 10px 5px; display: flex; gap: 5px;">
                <input type="email" id="search-user-input" placeholder="Search student email..." style="flex: 1; padding: 6px; border-radius: 4px; border: 1px solid #ccc;">
                <button id="search-user-btn" style="padding: 6px 10px; cursor: pointer;">🔍</button>
            </div>

            <div class="chat-targets">
                <button class="target-btn active" id="target-public">Global Chat</button>
                <hr>
                
                <div id="admin-monitor-panel" class="hidden" style="background: #fff3cd; padding: 8px; border-radius: 6px; border: 1px solid #ffeeba; margin-bottom: 10px;">
                    <h5 style="margin: 0 0 5px 0; color: #856404;">👁️ DM Intercept Monitor</h5>
                    <input type="text" id="admin-room-input" placeholder="student1__student2" style="width: 100%; box-sizing: border-box; padding: 4px; font-size: 0.8em; margin-bottom: 4px;">
                    <button id="admin-spy-btn" style="width:100%; font-size:0.8em; padding:4px; background:#856404; color:white; border:none; cursor:pointer;">Intercept DM Pipeline</button>
                </div>

                <h4>Active Conversations</h4>
                <div id="users-list"></div>
            </div>
        </aside>

        <main class="chat-area">
            <header id="chat-room-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #eee; border-bottom: 1px solid #ddd;">
                <h3 id="current-room-title">Global Chat</h3>
                <div class="view-toggles" style="display: flex; gap: 10px;">
                    <button id="view-chat-btn" class="active" style="padding: 6px 12px; cursor: pointer;">💬 Chat</button>
                    <button id="view-feed-btn" style="padding: 6px 12px; cursor: pointer;">🔥 Meme Feed</button>
                </div>
            </header>
            
            <div id="messaging-container" style="display: flex; flex-direction: column; flex: 1; overflow: hidden;">
                <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 20px;"></div>
                <form id="chat-form" style="display: flex; padding: 10px; border-top: 1px solid #ddd;">
                    <label class="file-label" style="padding: 10px; cursor: pointer;">
                        📁
                        <input type="file" id="media-input" accept="image/*,video/*" style="display:none;">
                    </label>
                    <input type="text" id="message-input" placeholder="Type a message or attach a file..." required autocomplete="off" style="flex: 1; padding: 10px; margin: 0 10px;">
                    <button type="submit" style="padding: 10px 20px;">Send</button>
                </form>
            </div>

            <div id="meme-feed-container" class="hidden" style="flex: 1; overflow-y: auto; padding: 20px;">
                <div class="create-post-card" style="background: #f9f9f9; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd;">
                    <h4 style="margin-top: 0;">Share a Meme to the School Feed</h4>
                    <form id="feed-post-form">
                        <input type="text" id="post-caption-input" placeholder="Write a funny caption..." required style="width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                        <div style="display: flex; align-items: center; margin-bottom: 10px; gap: 10px;">
                            <label class="file-label" style="padding: 8px 12px; background: #e0e0e0; border-radius: 4px; cursor: pointer; font-size: 0.9em;">
                                🖼️ Choose Meme File
                                <input type="file" id="feed-media-input" accept="image/*,video/*" style="display:none;" required>
                            </label>
                            <span id="feed-file-chosen" style="font-size: 0.85em; color: gray;">No file selected</span>
                        </div>
                        <button type="submit" style="width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Publish Post</button>
                    </form>
                </div>
                <div id="feed-posts-stream"></div>
            </div>
        </main>
    </div>

    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" id="close-profile-modal">&times;</span>
            <img id="view-profile-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="avatar-lg">
            <h3 id="view-profile-name">Username</h3>
            <p id="view-profile-email">email@example.com</p>
            <p id="view-profile-status" style="margin: 8px 0; color: #777; font-style: italic;"></p>
            <button id="dm-start-btn" style="margin-top: 12px; width: 100%;">💬 Send Message</button>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" id="close-settings-modal">&times;</span>
            <h3>Edit Profile Settings</h3>
            <form id="settings-form">
                <label>Change Profile Picture:</label>
                <input type="file" id="settings-avatar-input" accept="image/*">
                <label>Change Username/Display Name:</label>
                <input type="text" id="settings-name-input" placeholder="Set your username">
                <label>Update Status/Bio:</label>
                <input type="text" id="settings-status-input" placeholder="What's on your mind?">
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js?v=6"></script>
</body>
</html>
