<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Chat App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container" class="container">
        <h2>Welcome to ChatApp</h2>
        <form id="auth-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submit-btn">Login</button>
        </form>
        <p id="toggle-auth">Don't have an account? <span id="toggle-link">Sign Up</span></p>
    </div>

    <div id="chat-container" class="container hidden">
        <header>
            <h3>Chat Room</h3>
            <button id="logout-btn">Logout</button>
        </header>
        
        <div id="chat-messages">
            </div>

        <form id="chat-form">
            <input type="text" id="message-input" placeholder="Type a message..." required autocomplete="off">
            <button type="submit">Send</button>
        </form>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
